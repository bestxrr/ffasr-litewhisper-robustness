run_id: pilot_l_middle_u100_tuning_dev_proxy
hypothesis: "Evaluate 100-update middle-layer locality pilot on tuning-dev."
changed_variable: "adapter=artifacts/runs/pilot_l_middle_attn_simcal/adapter_update_100.safetensors"
control_run: baseline_tuning_dev_proxy and pilot_j_simcal_u100_tuning_dev_proxy
promotion_criterion: "Tuning-dev Avg improves >=2%, mid/low improves >=5% relative, dry regression <=0.7, catastrophic rate does not increase."
model:
  id: efficient-speech/lite-whisper-large-v3-turbo-acc
  revision: ef2c0dd768cc9832a8a5a3397ab7218c838fea66
  processor_id: openai/whisper-large-v3
  dtype: float16
  device: cuda
adapter:
  path: artifacts/runs/pilot_l_middle_attn_simcal/adapter_update_100.safetensors
  lora:
    rank: 16
    alpha: 32
    dropout: 0.0
    target_name_regex:
      - "model\\.encoder\\.layers\\.(21|22|23|24|25|26)\\.self_attn\\.(q_proj|v_proj|out_proj)$"
manifest: artifacts/manifests/proxy/tuning_dev_proxy.jsonl
output_dir: artifacts/reports/pilot_l_middle_u100_tuning_dev_proxy
decoding:
  max_new_tokens: 128
  num_beams: 1
  language: en
  task: transcribe
promotion:
  baseline_dry_wer: 1.9719251336898396
  catastrophic_length_ratio_threshold: 2.5
limits:
  max_samples:
  max_project_gb: 48

