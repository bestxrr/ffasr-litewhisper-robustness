run_id: pilot_c_clean_anchor_l0
hypothesis: "Clean CE anchor prevents the dry/high regression seen in Pilot A while retaining enough robust adaptation signal."
starting_checkpoint: efficient-speech/lite-whisper-large-v3-turbo-acc
changed_variable: "Pilot A target set plus clean CE anchor weight 0.25"
control_run: pilot_a_encoder_attn_l0 and baseline_mini_proxy
promotion_criterion: "Mini-proxy average improves over Pilot A and baseline dry regression <=0.7 absolute; degraded WER must not worsen versus baseline."
seed: 1337
model:
  id: efficient-speech/lite-whisper-large-v3-turbo-acc
  revision: ef2c0dd768cc9832a8a5a3397ab7218c838fea66
  processor_id: openai/whisper-large-v3
  dtype: float16
  device: cuda
train_manifest: artifacts/manifests/librispeech_train_clean_l0/manifest.jsonl
output_dir: artifacts/runs/pilot_c_clean_anchor_l0
max_updates: 50
max_wall_time_minutes: 20
micro_batch_size: 1
grad_accumulation: 8
learning_rate: 0.00005
weight_decay: 0.0
gradient_clip_norm: 1.0
loss:
  clean_ce_weight: 0.25
lora:
  rank: 16
  alpha: 32
  dropout: 0.05
  target_name_regex:
    - "model\\.encoder\\.layers\\..*\\.self_attn\\.(q_proj|v_proj|out_proj)$"
augmentation:
  condition_distribution:
    dry: 0.30
    high: 0.30
    mid: 0.20
    low: 0.20
  snr_db:
    high: [14.0, 25.0]
    mid: [8.0, 12.0]
    low: [-3.0, 6.0]
resources:
  expected_vram: "12-20 GB"
  expected_disk_usage: "<0.1 GB adapter/logs"
  max_project_gb: 48
