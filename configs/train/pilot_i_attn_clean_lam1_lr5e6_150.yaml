run_id: pilot_i_attn_clean_lam1_lr5e6_150
hypothesis: "Lowering LR to 5e-6 may slow the attention-only clean-anchor overfit seen in Pilot H while preserving Pilot D's low-condition gain."
starting_checkpoint: efficient-speech/lite-whisper-large-v3-turbo-acc
changed_variable: "learning_rate=5e-6; otherwise Pilot H/Pilot D attention-only normalized clean-anchor recipe"
control_run: pilot_d_clean_anchor_lam1_l0, pilot_h_attn_clean_lam1_300, and baseline_mini_proxy
promotion_criterion: "Mini-proxy Avg improves >=2%, combined mid/low improves >=5% relative, dry regression <=0.7, catastrophic rate does not increase."
seed: 1337
model:
  id: efficient-speech/lite-whisper-large-v3-turbo-acc
  revision: ef2c0dd768cc9832a8a5a3397ab7218c838fea66
  processor_id: openai/whisper-large-v3
  dtype: float16
  device: cuda
labels:
  language: en
  task: transcribe
  predict_timestamps: false
train_manifest: artifacts/manifests/librispeech_train_clean_diag/manifest.jsonl
output_dir: artifacts/runs/pilot_i_attn_clean_lam1_lr5e6_150
max_updates: 150
checkpoint_steps: [75, 100, 150]
max_wall_time_minutes: 30
micro_batch_size: 1
grad_accumulation: 8
learning_rate: 0.000005
weight_decay: 0.0
gradient_clip_norm: 1.0
loss:
  clean_ce_weight: 1.0
  normalize_clean_anchor: true
lora:
  rank: 16
  alpha: 32
  dropout: 0.05
  target_name_regex:
    - "model\\.encoder\\.layers\\..*\\.self_attn\\.(q_proj|v_proj|out_proj)$"
augmentation:
  condition_distribution:
    dry: 0.35
    high: 0.35
    mid: 0.20
    low: 0.10
  snr_db:
    high: [16.0, 25.0]
    mid: [10.0, 14.0]
    low: [3.0, 8.0]
  curriculum:
    - until_update: 50
      condition_distribution:
        dry: 0.35
        high: 0.35
        mid: 0.20
        low: 0.10
      snr_db:
        high: [16.0, 25.0]
        mid: [10.0, 14.0]
        low: [3.0, 8.0]
    - until_update:
      condition_distribution:
        dry: 0.25
        high: 0.25
        mid: 0.30
        low: 0.20
      snr_db:
        high: [14.0, 25.0]
        mid: [8.0, 13.0]
        low: [0.0, 6.0]
resources:
  expected_vram: "12-20 GB"
  expected_disk_usage: "<0.1 GB adapter/logs"
  max_project_gb: 48
