changed_variable: "simulator severity only: no frame dropout, softer low SNR, lower clipping probability and drive"
control_run: baseline_tuning_dev_proxy and pilot_j_simcal_attn_clean_lam1_l0
promotion_criterion: "Tuning-dev Avg improves >=2%, combined mid/low improves >=5% relative, dry regression <=0.7, catastrophic rate does not increase."
