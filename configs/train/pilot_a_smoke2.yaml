run_id: pilot_a_train_smoke2
hypothesis: Encoder attention LoRA improves degraded mid/low WER without dry regression.
starting_checkpoint: efficient-speech/lite-whisper-large-v3-turbo-acc
changed_variable: 'LoRA target set: encoder self-attention q/v/out only'
control_run: baseline_full_proxy and future Pilot B same-budget control
promotion_criterion: Stable loss/gradients, no numerical failure, then compare mini-proxy
  against Pilot B.
seed: 1337
model:
  id: efficient-speech/lite-whisper-large-v3-turbo-acc
  revision: ef2c0dd768cc9832a8a5a3397ab7218c838fea66
  processor_id: openai/whisper-large-v3
  dtype: float16
  device: cuda
train_manifest: artifacts/manifests/librispeech_train_clean_l0/manifest.jsonl
output_dir: artifacts/runs/pilot_a_train_smoke2
max_updates: 2
max_wall_time_minutes: 5
micro_batch_size: 1
grad_accumulation: 8
learning_rate: 5.0e-05
weight_decay: 0.0
gradient_clip_norm: 1.0
lora:
  rank: 16
  alpha: 32
  dropout: 0.05
  target_name_regex:
  - model\.encoder\.layers\..*\.self_attn\.(q_proj|v_proj|out_proj)$
augmentation:
  condition_distribution:
    dry: 0.3
    high: 0.3
    mid: 0.2
    low: 0.2
  snr_db:
    high:
    - 14.0
    - 25.0
    mid:
    - 8.0
    - 12.0
    low:
    - -3.0
    - 6.0
resources:
  expected_vram: 10-18 GB
  expected_disk_usage: <0.1 GB adapter/logs
  max_project_gb: 48
